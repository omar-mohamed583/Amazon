<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon - Shop The Best Products In Your Country</title>
    <link rel="stylesheet" href="CSS/tracking.css">
  </head>
  <body>

    <!-- Header -->

    <header>

        <!-- Container to Prevent content from expanding in very large Screens -->
        <div class="container">

          <a href="index.html">
            <picture>
              <source media="(min-width: 768px)" srcset="https://supersimple.dev/projects/amazon/images/amazon-logo-white.png">
              <img src="https://supersimple.dev/projects/amazon/images/amazon-mobile-logo-white.png" alt="Amazon logo" class="logo" width="100" height="32">
            </picture>
          </a>
    
          <div class="search-bar">
            <input type="search" name="search" placeholder="Search" enterkeyhint="search">
          
              <button type="submit">
                <img src="https://supersimple.dev/projects/amazon/images/icons/search-icon.png" loading="eager" alt="search-icon">
              </button>
            
          </div>
    
          <div class="burger-menu" role="button" aria-label="Menu Contains orders Page and Cart Page links">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="links">

            <a href="orders.html" class="returns">
              Returns 
              <span>& Orders</span>
            </a>
      
            <a href="cart.html" class="cart">
      
              <img src="https://supersimple.dev/projects/amazon/images/icons/cart-icon.png" loading="eager" alt="cart-icon">
      
              <span>0</span>
              Cart
            </a>
          </div>
        </div>
        
    </header>

    <main>
      <div class="container">

        <div class="order-not-found hide">
  
          <svg width="50" height="50" viewBox="0 0 24 24" fill="red">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="7" x2="12" y2="13" stroke="white" stroke-width="2"></line>
            <circle cx="12" cy="17" r="1.5" fill="white" />
          </svg>
  
          <h3>We're sorry</h3>
          <p>We couldn't track the package you're looking for</p>
        </div>

        <div class="package-container">
          
        </div>
      </div>
    </main>

    <script type="module" src="JS/tracking.js" defer></script>
</body>
</html>
