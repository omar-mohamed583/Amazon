<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon - Shop The Best Products In Your Country</title>
    <link rel="stylesheet" href="../CSS/Amazon.css">
</head>
<body>
    <header>
        <a href="Amazon.html">
            <img src="https://supersimple.dev/projects/amazon/images/amazon-logo-white.png" loading="eager" alt="amazon-logo-white">
        </a>
        <div class="search-bar">
            <input type="search" name="search" placeholder="Search">
            <button>
                <img src="https://supersimple.dev/projects/amazon/images/icons/search-icon.png" loading="eager" alt="search-icon">
            </button>
        </div>
        <a href="returns.html" class="returns">
            Returns 
            <span>& Orders</span>
        </a>
        <a href="cart.html" class="cart">
            <img src="https://supersimple.dev/projects/amazon/images/icons/cart-icon.png" loading="eager" alt="cart-icon">
            <span>0</span>
            Cart
        </a>
    </header>
    <main>
        <div class="card-container">
            <dialog id="dialog">
                <button onclick="dialog.close()" class="close-modal" aria-label="close modal">&times;</button>
                <form action="" method="dialog" class="add-product-form">
                    <label for="link-input">Product Preview Link</label>
                    <input type="text" id="link-input" required aria-required="true">

                    <label for="product-desc">Product Description</label>
                    <input type="text" id="product-desc" required aria-required="true">

                    <div class="stars">
                        <label for="star-nums">Number Of Stars</label>
                        <input type="text" id="star-nums" required aria-required="true">

                        <label for="star-count">Count</label>
                        <input type="number" id="star-count">
                    </div>

                    <label for="price">Price</label>
                    <input type="number" id="price" aria-required="true" required="required">

                    <button class="add" type="submit">Add Item</button>

                </form>
            </dialog>
        </div>
    </main>
    <script type="module" src="../JS/amazon.js" defer></script>
</body>
</html>
